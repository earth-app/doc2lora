name: Build Project

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# least privilege; no job here needs more than read access to the repo
permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: Lint with flake8
        run: |
          flake8 doc2lora/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 doc2lora/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
      - name: Format with black
        run: |
          black --check doc2lora/ tests/ examples/
      - name: Import sort check with isort
        run: |
          isort --check-only doc2lora/ tests/ examples/

  test:
    runs-on: ubuntu-latest
    needs: format
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all,test]"
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=doc2lora --cov-report=xml
    - name: Upload to Codecov
      if: ${{ always() }}
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: earth-app/doc2lora
        fail_ci_if_error: false
        flags: unittests
        files: ./coverage.xml
    - name: Archive Coverage Artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: coverage-artifacts-${{ github.run_id }}-py${{ matrix.python-version }}
        path: ./coverage.xml
        retention-days: 14

  build:
    needs: test
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'pip'
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build package
      run: python -m build
    - name: Check built package
      run: python -m twine check dist/*
